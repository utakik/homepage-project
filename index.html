<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Output Test</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 24px;
    }

    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card a {
      text-decoration: none;
      color: white;
      display: block;
      position: relative;
    }

    .card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transition: filter 0.25s ease;
    }

    .card:hover img {
      filter: brightness(0.7);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.05),
        rgba(0,0,0,0.65)
      );
    }

    .top-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .title {
      font-size: 1.25rem;
      margin: 0;
    }

    .excerpt {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s ease;
    }

    .card:hover .excerpt {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>
  <h1>Output Cards</h1>
  <div id="cards"></div>

  <script>
    async function loadCards() {
      const response = await fetch(`./data/output.json?t=${Date.now()}`);
      const cards = await response.json();

      const container = document.getElementById("cards");

      if (cards.length === 0) {
        container.innerHTML = "<p>公開カードがありません。</p>";
        return;
      }

      cards.forEach(card => {
        const article = document.createElement("article");
        article.className = "card";

        const imageHtml = card.hasImage
          ? `<img src="./${card.imagePath}" alt="${card.title}">`
          : "";


        const excerptHtml = card.excerpt
            ? `<p class="excerpt">${card.excerpt}</p>`
            : "";
        
        article.innerHTML = `
            <a href="./detail.html?slug=${encodeURIComponent(card.slug)}">
              ${imageHtml}
              <div class="overlay">
                <div class="top-info">
                    <div class="date">${card.date}</div>
                    <h2 class="title">${card.title}</h2>
                </div>
                ${excerptHtml}
              </div>
            </a>
        `;
        

        container.appendChild(article);
      });
    }

    loadCards().catch(error => {
      console.error(error);
      document.getElementById("cards").innerHTML = "<p>読み込みに失敗しました。</p>";
    });
  </script>
</body>
</html>
